<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elo leaderboard</title>
    <link rel="stylesheet" href="css/site.css" />
  </head>
  <body>
    <header>
      <h1>Elo leaderboard</h1>
    </header>
    <main>
      <p class="muted" id="meta"></p>
      <div class="panel">
        <label for="filter">Filter players</label>
        <input type="search" id="filter" placeholder="Name contains…" autocomplete="off" />
        <table>
          <thead>
            <tr>
              <th class="num">Rank</th>
              <th>Player</th>
              <th class="num">Elo</th>
              <th class="num">Games</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
    <script defer src="js/home.js"></script>
    <script defer>
      document.addEventListener("DOMContentLoaded", () => {
        window.mountHome({
          metaEl: document.getElementById("meta"),
          tbodyEl: document.getElementById("rows"),
          filterEl: document.getElementById("filter"),
        });
      });
    </script>
  </body>
</html>
