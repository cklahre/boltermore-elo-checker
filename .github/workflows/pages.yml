name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build leaderboard JSON for the static site
        run: |
          set -euo pipefail
          mkdir -p site/data

          if [ -f bcp-matches.json ]; then
            go run ./cmd/local-elo -matches bcp-matches.json -out-web-dir site/data -web-page-size 50
          elif [ -f testdata/sample-matches.json ]; then
            go run ./cmd/local-elo -matches testdata/sample-matches.json -out-web-dir site/data -web-page-size 50
          else
            printf '%s\n' '{"version":2,"as_of":"","page_size":50,"total_players":0,"page_count":0,"pages":[],"outline_file":"outline.json"}' > site/data/index.json
            printf '%s\n' '{"as_of":"","players":[]}' > site/data/outline.json
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
